dataset:
  path: "../extract-bench/dataset"
  schema: "hiring/resume"
  split_seed: 42
  split_ratios: [0.60, 0.20, 0.20]

seed_prompt: |
  You are an expert HR document analyst. Extract
  structured information from the provided resume
  PDF according to the JSON schema below.
  
  EXTRACTION RULES:
  - Return ONLY a valid JSON object matching schema
  - Extract ALL fields present in the document
  - Use null for fields not found
  - For arrays include EVERY item found
  - Never fabricate information
  - Preserve exact names and dates as written
  
  JSON SCHEMA:
  {schema}
  
  Respond with ONLY the JSON object.
  No explanation. No markdown. No extra text.

extraction_llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  api_key_env: "GOOGLE_API_KEY"
  temperature: 0
  max_output_tokens: 32768

mutation_llm:
  provider: "groq"
  model: "llama-3.1-8b-instant"
  api_key_env: "GROQ_API_KEY"
  temperature: 0.7
  max_output_tokens: 4096

scoring_llm:
  provider: "groq"
  model: "llama-3.1-8b-instant"
  api_key_env: "GROQ_API_KEY"
  temperature: 0
  max_output_tokens: 2048

budget:
  max_iterations: 15
  max_tokens: 500000
  max_cost_usd: 1.00
  max_wall_clock_seconds: 5400

optimizer:
  stall_threshold: 3
  duplicate_similarity_threshold: 0.95
  overfitting_check_interval: 3
  overfitting_gap_threshold: 0.1

output:
  run_dir: "../runs"

dry_run:
  enabled: false
  docs_per_split: 2
